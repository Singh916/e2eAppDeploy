apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app
spec: 
  replicas: 3
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
      - name: go-app
        image: singh916/go-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080  